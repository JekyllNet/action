name: JekyllNet
description: Install the JekyllNet dotnet tool from NuGet and build a Jekyll-style static site.
author: JekyllNet

branding:
  icon: book-open
  color: blue

inputs:
  source:
    description: Site source directory, relative to the workflow workspace unless an absolute path is provided.
    required: false
    default: .
  destination:
    description: Build output directory, relative to the workflow workspace unless an absolute path is provided.
    required: false
    default: _site
  drafts:
    description: Include content from _drafts.
    required: false
    default: "false"
  future:
    description: Include content dated in the future.
    required: false
    default: "false"
  unpublished:
    description: Include content with published false.
    required: false
    default: "false"
  posts-per-page:
    description: Override pagination page size.
    required: false
    default: ""
  tool-version:
    description: Optional JekyllNet dotnet tool version. Leave empty to install the latest available version from NuGet.
    required: false
    default: ""
  nuget-source:
    description: NuGet feed used to install the JekyllNet dotnet tool.
    required: false
    default: https://api.nuget.org/v3/index.json
  nuget-auth-token:
    description: Optional auth token for authenticated NuGet feeds. GitHub Packages falls back to github.token when this input is empty.
    required: false
    default: ""
  nuget-username:
    description: Optional username for authenticated NuGet feeds. GitHub Packages falls back to github.actor when this input is empty.
    required: false
    default: ""
  dotnet-version:
    description: .NET SDK version to install before running the action.
    required: false
    default: 10.0.x
  setup-dotnet:
    description: Install the configured .NET SDK before running JekyllNet.
    required: false
    default: "true"
  cache:
    description: Cache NuGet packages and the global JekyllNet tool between workflow runs.
    required: false
    default: "true"
  upload-artifact:
    description: Upload the generated destination directory as a workflow artifact.
    required: false
    default: "false"
  artifact-name:
    description: Artifact name used when upload-artifact is enabled.
    required: false
    default: jekyllnet-site

outputs:
  destination:
    description: Absolute path to the generated site output.
    value: ${{ steps.build.outputs.destination }}

runs:
  using: composite
  steps:
    - name: Setup .NET
      if: ${{ inputs.setup-dotnet == 'true' }}
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Add .NET tools to PATH
      shell: bash
      run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

    - name: Resolve JekyllNet cache key
      if: ${{ inputs.cache == 'true' }}
      id: cache-key
      shell: bash
      env:
        INPUT_DOTNET_VERSION: ${{ inputs.dotnet-version }}
        INPUT_TOOL_VERSION: ${{ inputs.tool-version }}
        INPUT_NUGET_SOURCE: ${{ inputs.nuget-source }}
      run: |
        runner_os=$(printf '%s' "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')
        runner_arch=$(printf '%s' "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')

        if command -v sha256sum >/dev/null 2>&1; then
          source_hash=$(printf '%s' "$INPUT_NUGET_SOURCE" | sha256sum | awk '{ print substr($1, 1, 16) }')
        else
          source_hash=$(printf '%s' "$INPUT_NUGET_SOURCE" | shasum -a 256 | awk '{ print substr($1, 1, 16) }')
        fi

        cache_prefix="$runner_os-$runner_arch-jekyllnet-tool-$INPUT_DOTNET_VERSION-$source_hash"

        if [ -n "$INPUT_TOOL_VERSION" ]; then
          primary_key="$cache_prefix-version-$INPUT_TOOL_VERSION"
          restore_key=""
          can_skip_install=true
        else
          cache_day=$(date -u +%Y%m%d)
          primary_key="$cache_prefix-floating-$cache_day"
          restore_key="$cache_prefix-floating-"
          can_skip_install=false
        fi

        echo "primary_key=$primary_key" >> "$GITHUB_OUTPUT"
        echo "restore_key=$restore_key" >> "$GITHUB_OUTPUT"
        echo "can_skip_install=$can_skip_install" >> "$GITHUB_OUTPUT"

    - name: Cache JekyllNet tool
      if: ${{ inputs.cache == 'true' }}
      id: tool-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.nuget/packages
          ~/.dotnet/tools
          ~/.dotnet/toolResolverCache
          ~/.local/share/NuGet/v3-cache
          ~/AppData/Local/NuGet/v3-cache
        key: ${{ steps.cache-key.outputs.primary_key }}
        restore-keys: ${{ steps.cache-key.outputs.restore_key }}

    - name: Install JekyllNet dotnet tool
      if: ${{ inputs.cache != 'true' || steps.cache-key.outputs.can_skip_install != 'true' || steps.tool-cache.outputs.cache-hit != 'true' }}
      shell: bash
      env:
        INPUT_NUGET_AUTH_TOKEN: ${{ inputs.nuget-auth-token }}
        INPUT_NUGET_USERNAME: ${{ inputs.nuget-username }}
        GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        GITHUB_ACTOR_FALLBACK: ${{ github.actor }}
      run: |
        source_url="${{ inputs.nuget-source }}"
        nuget_auth_token="$INPUT_NUGET_AUTH_TOKEN"
        nuget_auth_username="$INPUT_NUGET_USERNAME"

        if [[ "$source_url" == https://nuget.pkg.github.com/* ]]; then
          if [ -z "$nuget_auth_token" ]; then
            nuget_auth_token="$GITHUB_TOKEN_FALLBACK"
          fi

          if [ -z "$nuget_auth_username" ]; then
            nuget_auth_username="$GITHUB_ACTOR_FALLBACK"
          fi
        fi

        config_file="$RUNNER_TEMP/jekyllnet.nuget.config"
        printf '<configuration />\n' > "$config_file"

        if [ -n "$nuget_auth_token" ]; then
          if [ -z "$nuget_auth_username" ]; then
            echo "::error::nuget-username is required when nuget-auth-token is set."
            exit 1
          fi

          dotnet nuget add source "$source_url" \
            --name JekyllNet \
            --configfile "$config_file" \
            --username "$nuget_auth_username" \
            --password "$nuget_auth_token" \
            --store-password-in-clear-text
        else
          dotnet nuget add source "$source_url" \
            --name JekyllNet \
            --configfile "$config_file"
        fi

        operation=install

        if dotnet tool list --global | tail -n +3 | awk '{ print tolower($1) }' | grep -Fxq 'jekyllnet'; then
          operation=update
        fi

        args=(
          tool
          "$operation"
          --global
          JekyllNet
          --configfile "$config_file"
        )

        if [ -n "${{ inputs.tool-version }}" ]; then
          args+=(--version "${{ inputs.tool-version }}")
        fi

        dotnet "${args[@]}"

    - name: Build site
      id: build
      shell: bash
      run: |
        args=(
          build
          --source "${{ inputs.source }}"
          --destination "${{ inputs.destination }}"
          --drafts "${{ inputs.drafts }}"
          --future "${{ inputs.future }}"
          --unpublished "${{ inputs.unpublished }}"
          --github-output-destination
        )

        if [ -n "${{ inputs.posts-per-page }}" ]; then
          args+=(--posts-per-page "${{ inputs.posts-per-page }}")
        fi

        jekyllnet "${args[@]}"

    - name: Upload site artifact
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.build.outputs.destination }}
